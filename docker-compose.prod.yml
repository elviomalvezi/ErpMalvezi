services:

  # ── Banco de Dados ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: appfin_postgres
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Storage de Arquivos (MinIO) ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: appfin_minio
    restart: unless-stopped
    env_file: .env.prod
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Backend FastAPI ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appfin_backend
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8000"

  # ── Frontend Angular + nginx ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appfin_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certificado TLS do dominio do ErpMalvezi (fora do repo, na VM).
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
