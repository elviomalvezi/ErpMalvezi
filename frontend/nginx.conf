# Rate-limit por IP para a API (contexto http — conf.d é incluído dentro de http{}).
# 20 req/s sustentado, com rajada de até 40. Protege contra brute-force/abuso.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# ── HTTP → redireciona tudo para HTTPS ─────────────────────────────────────────
server {
    listen 80;
    server_name _;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# ── HTTPS (TLS) ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name erpmalvezi.local;  # ajustar para o dominio definitivo do ErpMalvezi

    root /usr/share/nginx/html;
    index index.html;

    # Certificado TLS do dominio do ErpMalvezi (montado read-only via compose).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Não revela a versão do nginx nas respostas/erros.
    server_tokens off;

    # ── Cabeçalhos de segurança (aplicados sempre, inclusive em erros) ──────────
    # Agora sobre HTTPS, o HSTS passa a ser honrado pelos navegadores.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP temporariamente desativado: quebrava o carregamento dos ícones (PrimeIcons).
    # Reintroduzir após validar uma política que permita as fontes/ícones do app.
    # add_header Content-Security-Policy "..." always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy para o backend FastAPI
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 50m;
    }

    # index.html NUNCA pode ser cacheado: ele referencia os bundles com hash.
    # Se o navegador guardar um index.html antigo, carrega o app inteiro velho
    # (bundles imutáveis cacheados) e novos deploys "somem" até hard refresh.
    location = /index.html {
        # add_header em location anula os do server → repete os de segurança.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # add_header Content-Security-Policy "..." always;  # ver nota no bloco server
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # SPA: todas as rotas servem o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos (bundles têm hash no nome → seguro como immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        add_header X-Content-Type-Options "nosniff" always;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
